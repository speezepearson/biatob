{% extends 'base_page.html' %}
{% block title %} Register new user {% endblock %}
{% block page_body %}
  <script type="text/javascript" src="/elm/InitUser.js"></script>
  <script type="text/javascript">

    var email = {{ email | tojson }};
    var proofOfEmailToken = {{ proof_of_email_token | tojson }};

    main({elmApp: Elm.Elements.InitUser, flags: {email, proofOfEmailToken}});

    if (e = document.getElementById('register-username-field')) { e.focus(); }
  </script>
{% endblock %}
