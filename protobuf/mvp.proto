syntax = "proto3";

package biatob.proto.mvp;

message AuthToken {
  bytes hmac_of_rest = 1;
  string owner = 7;
  double minted_unixtime = 5;
  double expires_unixtime = 6;

}

message DatabaseInfo {
  oneof database_kind {
    string sqlite = 1;
    MysqlDbCredentials mysql = 2;
  }
  message MysqlDbCredentials {
    string hostname = 1;
    string username = 2;
    string password = 3;
    string dbname = 4;
  }
}

message CredentialsConfig {
  SmtpCredentials smtp = 1;
  bytes token_signing_secret = 2;
  DatabaseInfo database_info = 3;
  message SmtpCredentials {
    string hostname = 1;
    uint32 port = 2;
    string username = 3;
    string password = 4;
    string from_addr = 5;
  }
}

message EmailFlowState {
  oneof email_flow_state_kind {
    Void unstarted = 1;
    CodeSent code_sent = 2;
    string verified = 3;
  }
  message CodeSent {
    string email = 1;
    HashedPassword code = 2;
  }
}

message HashedPassword {
  bytes salt = 1;
  bytes scrypt = 2;
}

message GenericUserInfo {
  string email_address = 10;
  map<string, Invitation> invitations = 5;
  map<string, Relationship> relationships = 6;

  oneof login_type {
    HashedPassword login_password = 7;
  }

  message Invitation {}
}
message Relationship {
  bool trusts_you = 1;
  bool trusted_by_you = 2;
}

message UsernameInfo {
  GenericUserInfo info = 1;
  HashedPassword password = 2;
}

message EmailAttempt {
  double unixtime = 1;
  bool succeeded = 2;
}

message ResolutionEvent {
  double unixtime = 4;
  Resolution resolution = 2;
  string notes = 3;
  ResolutionEvent prior_revision = 5;
}

enum TradeState {
  TRADE_STATE_ACTIVE = 0;
  TRADE_STATE_QUEUED = 1;
  TRADE_STATE_DISAVOWED = 2;
  TRADE_STATE_DEQUEUE_FAILED = 3;
}
message Trade {
  string bettor = 7;
  bool bettor_is_a_skeptic = 2;
  uint32 bettor_stake_cents = 3;
  uint32 creator_stake_cents = 4;
  double transacted_unixtime = 6;
  double updated_unixtime = 8;
  string notes = 9;
  TradeState state = 10;
}

enum Void {
  VOID = 0;
}

enum Resolution {
  RESOLUTION_NONE_YET = 0;
  RESOLUTION_YES = 1;
  RESOLUTION_NO = 2;
  RESOLUTION_INVALID = 3;
}

// A success payload that carries no information -- the analogue of the old
// `oneof foo_result { Void ok = 1; ... }`.
message Empty {}

// The body of any non-2xx API response.
//
// Endpoints return their payload directly with a 200, and signal failure with
// an HTTP status code plus this body. See docs/error-handling.md.
message ErrorResponse {
  string catchall = 1;
}

message WhoamiRequest {}
message WhoamiResponse {
  string username = 1;
}

message SignOutRequest {}
message SignOutResponse {}

message AuthSuccess {
  AuthToken token = 1;
  GenericUserInfo user_info = 2;
}

message SendVerificationEmailRequest {
  string email_address = 1;
}
// Returns Empty on 200; 400 if already logged in, 409 if the email is already
// registered.

message ProofOfEmail {
  Payload payload = 1;
  bytes salt = 2;
  bytes hmac = 3;
  message Payload {
    string email_address = 1;
  }
}

message RegisterUsernameRequest {
  string username = 1;
  string password = 2;
  ProofOfEmail proof_of_email = 3;
}
// Returns AuthSuccess on 200; 409 if the username is taken, 400 on invalid
// username/password/proof-of-email.
//
// The old Error carried a `Void username_taken = 2` variant alongside
// `catchall`; 409 now carries that distinction.

message LogInUsernameRequest {
  string username = 1;
  string password = 2;
}
// Returns AuthSuccess on 200; 401 on bad credentials, 400 if already logged in.

message CertaintyRange {
  float low = 1;
  float high = 2;
}
enum PredictionViewPrivacy {
  PREDICTION_VIEW_PRIVACY_ANYBODY = 0;
  PREDICTION_VIEW_PRIVACY_ANYBODY_WITH_THE_LINK = 1;
}
message CreatePredictionRequest {
  string prediction = 2;
  PredictionViewPrivacy view_privacy = 3;
  CertaintyRange certainty = 4;
  uint32 maximum_stake_cents = 5;
  uint32 open_seconds = 6;
  string special_rules = 7;
  double resolves_at_unixtime = 9;
}
// Returns CreatePredictionResponse on 200; 401 if logged out, 400 if invalid.
// Kept as a message (rather than returning a bare string) because a top-level
// protobuf response body has to be a message.
message CreatePredictionResponse {
  string new_prediction_id = 1;
}

message GetPredictionRequest {
  string prediction_id = 2;
}
// Returns UserPredictionView on 200; 404 if there's no such prediction (or the
// viewer may not see it).
//
// The old Error carried a `Void no_such_prediction = 2` variant to distinguish
// that case from `catchall`. Nothing in the Elm app ever read it -- the 404
// carries that information now, where HTTP already puts it.

enum PredictionFollowingStatus {
  PREDICTION_FOLLOWING_NOT_FOLLOWING = 0;
  PREDICTION_FOLLOWING_FOLLOWING = 1;
  PREDICTION_FOLLOWING_MANDATORY_BECAUSE_STAKED = 2;
}
message UserPredictionView {
  string prediction = 1;
  CertaintyRange certainty = 2;
  uint32 maximum_stake_cents = 3;
  uint32 remaining_stake_cents_vs_believers = 4;
  uint32 remaining_stake_cents_vs_skeptics = 5;
  double created_unixtime = 13;
  double closes_unixtime = 14;
  string special_rules = 8;
  string creator = 9;
  ResolutionEvent resolution = 17;
  repeated Trade your_trades = 11;
  double resolves_at_unixtime = 15;
  PredictionFollowingStatus your_following_status = 18;
}

message ListMyStakesRequest {
}
// Returns PredictionsById on 200; 401 if logged out.
message PredictionsById {
  map<string, UserPredictionView> predictions = 1;
}

message ListPredictionsRequest {
  string creator = 2;
}
// Returns PredictionsById on 200; 401 if logged out.

message FollowRequest {
  string prediction_id = 1;
  bool follow = 2;
}
// Returns UserPredictionView on 200; 401 if logged out, 404 if no such prediction.

message StakeRequest {
  string prediction_id = 2;
  bool bettor_is_a_skeptic = 3;
  uint32 bettor_stake_cents = 4;
}
// Returns UserPredictionView on 200; 401 logged out, 404 no such prediction,
// 403 if you don't trust the creator, 409 if closed/resolved or over a stake cap.

message ResolveRequest {
  string prediction_id = 1;
  Resolution resolution = 2;
  string notes = 3;
}
// Returns UserPredictionView on 200; 401 logged out, 404 no such prediction,
// 403 if you're not the creator, 400 if the resolution/notes are invalid.

message SetTrustedRequest {
  string who = 3;
  bool trusted = 2;
}
// Returns GenericUserInfo on 200; 401 logged out, 404 no such user, 400 for self.

message GetUserRequest {
  string who = 2;
}
// Returns Relationship on 200; 404 if no such user.

message ChangePasswordRequest {
  string old_password = 1;
  string new_password = 2;
}
// Returns Empty on 200; 401 logged out or wrong old password, 400 if invalid.

message GetSettingsRequest {
  repeated string include_relationships_with_users = 1;
}
// Returns GenericUserInfo on 200; 401 if logged out.

message SendInvitationRequest {
  string recipient = 1;
}
// Returns GenericUserInfo on 200; 401 logged out, 404 no such recipient,
// 409 if already invited.

message CheckInvitationRequest {
  string nonce = 1;
}
// Returns CheckInvitationResponse on 200; 404 if no such invitation.
// The old nested `Result` message is flattened up into the response itself.
message CheckInvitationResponse {
  string inviter = 1;
  string recipient = 2;
}

message AcceptInvitationRequest {
  string nonce = 1;
}
// Returns GenericUserInfo on 200; 404 if no such invitation.


message SavedCreatedPredictionFormState {
  string prediction_field = 1;
  string resolves_at_field = 2;
  string stake_field = 3;
  string low_p_field = 4;
  string high_p_field = 5;
  string open_for_unit_field = 6;
  string open_for_seconds_field = 7;
  string view_privacy_field = 9;
  string special_rules_field = 8;
}